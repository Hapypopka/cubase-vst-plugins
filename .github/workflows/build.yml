name: Build VST3 plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-7.0.12-${{ runner.os }}

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 7.0.12 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Collect .vst3 bundles
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $vsts = Get-ChildItem -Path build -Recurse -Filter "*.vst3" -Directory
          if ($vsts.Count -eq 0) {
            Write-Error "No .vst3 bundles found in build/"
            exit 1
          }
          foreach ($p in $vsts) {
            $zipName = "$($p.Name).zip"
            Compress-Archive -Path $p.FullName -DestinationPath "artifacts/$zipName" -Force
            Write-Host "Packaged: $zipName"
          }

      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          # Имя релиза = первая строка последнего commit message
          $commitMsg = git log -1 --pretty=%s
          if ([string]::IsNullOrWhiteSpace($commitMsg)) { $commitMsg = "Обновление плагинов" }
          # Очистим от служебных префиксов типа "fix:", "feat:" и тд
          $commitMsg = $commitMsg -replace '^(fix|feat|chore|docs|refactor|test|update|build):\s*', ''
          # Capitalize first letter
          if ($commitMsg.Length -gt 0) { $commitMsg = $commitMsg.Substring(0,1).ToUpper() + $commitMsg.Substring(1) }
          echo "release_name=$commitMsg" >> $env:GITHUB_OUTPUT
          Write-Host "Release name: $commitMsg"

          # Тело релиза — список всех плагинов с описаниями из INFO.md
          $body = @()
          $body += "## Плагины в этом релизе"
          $body += ""

          $pluginDirs = Get-ChildItem -Path plugins -Directory -ErrorAction SilentlyContinue
          foreach ($dir in $pluginDirs) {
            $dirName = $dir.Name
            $infoFile = Join-Path $dir.FullName "INFO.md"
            $name_ru = $dirName
            $emoji = "🎛️"
            $desc = ""

            if (Test-Path $infoFile) {
              $content = Get-Content $infoFile -Raw
              if ($content -match '(?m)^name_ru:\s*(.+)$')     { $name_ru = $matches[1].Trim() }
              if ($content -match '(?m)^emoji:\s*(.+)$')       { $emoji = $matches[1].Trim() }
              if ($content -match '(?m)^description:\s*(.+)$') { $desc = $matches[1].Trim() }
            }
            $line = "$emoji **$name_ru** — файл $dirName.vst3.zip"
            if ($desc) { $line += " — $desc" }
            $body += $line
          }

          $body += ""
          $body += "---"
          $body += ""
          $body += "**Установка**: скачай нужный .zip ниже, распакуй его и положи папку .vst3 в C:\Program Files\Common Files\VST3\, перезапусти Cubase."

          $bodyText = $body -join "`n"
          $bodyText | Out-File -FilePath release_body.md -Encoding utf8
          Write-Host "Body:"
          Write-Host $bodyText

      - name: Compute version tag
        id: ver
        shell: pwsh
        run: |
          $tag = "build-$(Get-Date -Format yyyyMMdd-HHmmss)-${{ github.run_number }}"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.notes.outputs.release_name }}
          body_path: release_body.md
          files: artifacts/*.zip
